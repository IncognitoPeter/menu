<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu & Wina - Fiszki</title>
    <style>
        body {
            background-color: #333333;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .top-bar {
            width: 100%;
            background-color: #222222;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .top-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            position: relative;
        }
        .toggle-circle {
            width: 16px;
            height: 16px;
            background-color: #333333;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }
        .help-btn {
            background-color: #555555;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .home-btn {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .category-selectors, .mode-selectors {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .cat-btn, .mode-btn {
            background-color: #555555;
            color: #aaaaaa;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }
        .cat-btn.active {
            background-color: #0284c7;
            color: #ffffff;
        }
        .mode-btn.active {
            background-color: #666666;
            color: #ffffff;
        }
        .title-banner {
            background-color: #222222;
            padding: 10px 30px;
            border-radius: 4px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #444444;
            text-align: center;
        }
        .quiz-container {
            background-color: #444444;
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .option-item {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .option-item:hover {
            background-color: #666666;
        }
        .option-item.correct {
            background-color: #2e7d32 !important;
        }
        .option-item.wrong {
            background-color: #c62828 !important;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 25px;
        }
        .nav-button {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .counter-box {
            background-color: #222222;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .go-to-box {
            font-size: 14px;
            color: #cccccc;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .go-to-box input {
            background-color: #222222;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 4px;
            width: 50px;
            text-align: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <div class="toggle-switch"><div class="toggle-circle"></div></div>
        <button class="help-btn">?</button>
    </div>
    <button class="home-btn">Strona główna</button>
</div>

<div class="main-content">
    <div class="category-selectors">
        <button class="cat-btn active" id="cat-food" onclick="changeCategory('food')">Jedzenie</button>
        <button class="cat-btn" id="cat-wine" onclick="changeCategory('wine')">Wina</button>
    </div>

    <div class="mode-selectors">
        <button class="mode-btn active" id="btn-learn" onclick="changeMode('learn')">Tryb nauki</button>
        <button class="mode-btn" id="btn-quiz" onclick="changeMode('quiz')">Tryb quizu</button>
    </div>

    <div class="title-banner" id="title-banner">Jedzenie - Fiszki</div>

    <div class="quiz-container">
        <div class="question-text" id="display-question">Ładowanie...</div>
        <div class="options-list" id="display-options"></div>
    </div>

    <div class="controls-row">
        <button class="nav-button" onclick="prevItem()">&lt; Poprzednie</button>
        <button class="nav-button" onclick="nextItem()">Następne &gt;</button>
    </div>

    <div class="counter-box" id="display-counter">Pytanie 1 z 1</div>
    
    <div class="go-to-box">
        Idź do pozycji: <input type="number" id="input-index" onchange="goToItem(this.value)">
    </div>
</div>

let activeCategory = 'food';
let menu = foodMenu;
let currentIndex = 0;
let currentMode = 'learn';
let userSelected = false;

function changeCategory(cat) {
    activeCategory = cat;
    document.getElementById('cat-food').classList.toggle('active', cat === 'food');
    document.getElementById('cat-wine').classList.toggle('active', cat === 'wine');
    
    if (cat === 'food') {
        menu = foodMenu;
        document.getElementById('title-banner').innerText = 'Jedzenie - Fiszki';
    } else {
        menu = wineMenu;
        document.getElementById('title-banner').innerText = 'Karta Win - Fiszki';
    }
    
    currentIndex = 0;
    updateUI();
}

function updateUI() {
    userSelected = false;
    const current = menu[currentIndex];
    
    document.getElementById('display-counter').innerText = `Pozycja ${currentIndex + 1} z ${menu.length}`;
    document.getElementById('input-index').value = currentIndex + 1;
    
    const questionEl = document.getElementById('display-question');
    const optionsEl = document.getElementById('display-options');
    optionsEl.innerHTML = '';

    if (currentMode === 'learn') {
        questionEl.innerText = `${current.n}:`;
        
        const btn = document.createElement('button');
        btn.className = 'option-item';
        btn.innerText = activeCategory === 'food' ? "Kliknij, aby zobaczyć skład i alergeny" : "Kliknij, aby zobaczyć profil, parowanie i ciekawostki";
        btn.onclick = () => {
            btn.style.display = 'none';
            
            const infoText = document.createElement('div');
            infoText.style.textAlign = 'left';
            infoText.style.lineHeight = '1.5';
            infoText.style.whiteSpace = 'pre-line';
            
            const label1 = activeCategory === 'food' ? 'Skład' : 'Charakterystyka';
            const label2 = activeCategory === 'food' ? 'Alergeny' : 'Ciekawostki / Wskazówki';

            infoText.innerHTML = `<strong>${label1}:</strong>\n${current.i}\n\n<span style="color:#fca5a5"><strong>${label2}:</strong>\n${current.a}</span>`;
            optionsEl.appendChild(infoText);
        };
        optionsEl.appendChild(btn);
    } else {
        questionEl.innerText = activeCategory === 'food' 
            ? `Jakie składniki i dodatki zawiera potrawa: "${current.n}"?`
            : `Jaki profil, szczep i cechy posiada wino: "${current.n}"?`;
        
        let answers = [current.i];
        while (answers.length < Math.min(4, menu.length)) {
            let rand = menu[Math.floor(Math.random() * menu.length)].i;
            if (!answers.includes(rand)) answers.push(rand);
        }
        answers.sort(() => Math.random() - 0.5);
        
        answers.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'option-item';
            btn.style.whiteSpace = 'pre-line';
            btn.innerText = ans;
            btn.onclick = () => {
                if (userSelected) return;
                userSelected = true;
                if (ans === current.i) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    Array.from(optionsEl.children).forEach(b => {
                        if (b.innerText === current.i) b.classList.add('correct');
                    });
                }
            };
            optionsEl.appendChild(btn);
        });
    }
}

function changeMode(mode) {
    currentMode = mode;
    document.getElementById('btn-learn').classList.toggle('active', mode === 'learn');
    document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
    updateUI();
}

function nextItem() {
    if (currentIndex < menu.length - 1) {
        currentIndex++;
        updateUI();
    }
}

function prevItem() {
    if (currentIndex > 0) {
        currentIndex--;
        updateUI();
    }
}

function goToItem(val) {
    let idx = parseInt(val) - 1;
    if (idx >= 0 && idx < menu.length) {
        currentIndex = idx;
        updateUI();
    }
}

updateUI();
