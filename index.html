<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trener Kelnerski - Kompletny Manual</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #1e293b; --accent: #0f766e; --text: #334155; --correct: #16a34a; --wrong: #dc2626; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 550px; width: 100%; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); box-sizing: border-box; border: 1px solid #e2e8f0; }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin: 0 0 5px 0; }
        .score-board { text-align: center; font-size: 14px; margin-bottom: 20px; color: #64748b; font-weight: 500; }
        .modes { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 600; background: #f1f5f9; color: #64748b; transition: 0.2s; }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .card { background: #fafafa; border: 2px dashed #cbd5e1; border-radius: 14px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px; cursor: pointer; margin-bottom: 20px; box-sizing: border-box; transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-title { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
        .card-details { font-size: 15px; color: #475569; line-height: 1.5; background: #ffffff; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; width: 100%; box-sizing: border-box; }
        .allergen-tag { display: inline-block; background: #fef2f2; color: #991b1b; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 6px; margin-top: 10px; border: 1px solid #fee2e2; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 14px; color: #334155; line-height: 1.4; transition: 0.15s; }
        .option-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .correct { background: #f0fdf4 !important; border-color: var(--correct) !important; color: var(--correct) !important; font-weight: bold; }
        .wrong { background: #fef2f2 !important; border-color: var(--wrong) !important; color: var(--wrong) !important; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; }
        .nav-btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .nav-btn:hover { background: #0f172a; }
    </style>
</head>
<body>

<div class="container">
    <h1>Manual Kelnerski: Symulator</h1>
    <div class="score-board">Poprawne: <span id="score">0</span> | Seria: <span id="streak">0</span></div>
    
    <div class="modes">
        <button class="btn active" id="mode-flash" onclick="setMode('flash')">Tryb Fiszki</button>
        <button class="btn" id="mode-quiz" onclick="setMode('quiz')">Tryb Quiz ABCD</button>
    </div>

    <div id="flashcard-area" class="card" onclick="flipCard()">
        <div class="card-title" id="dish-name">Wybieranie pytania...</div>
        <div id="dish-box" style="display:none; width:100%;">
            <div class="card-details" id="dish-ingredients"></div>
            <div class="allergen-tag" id="dish-allergens"></div>
        </div>
    </div>

    <div id="quiz-area" class="options" style="display:none;"></div>

    <div class="nav-btns">
        <div></div>
        <button class="nav-btn" onclick="nextQuestion()">Następne danie →</button>
    </div>
</div>

<script>
const menu = [
    {n: "Grillowany ser górski z żurawiną i boczkiem", i: "Wędzony ser z mleka krowiego (smak zbliżony do oscypka). Plastry sera owijane boczkiem, przesmażane. Dodatek: żurawina marynowana.", a: "Mleko i produkty pochodne"},
    {n: "Śledź z cebulką i śmietaną", i: "Śledź po krakowsku, marynowany min. 12h w zalewie z octu, cukru, ziela angielskiego, liścia laurowego i warzyw. Zaprawa z cebuli, jabłka i jogurtu naturalnego. Układany na płacie ryby. Dodatki: jabłko, cebula czerwona, jajko.", a: "Jaja, Ryby, Mleko i produkty pochodne, Seler"},
    {n: "Polski węgorz wędzony", i: "Węgorz wędzony podawany na ciepło na grzance maślanej z ogórkiem, kwaśną śmietaną i kawiorem z łososia.", a: "Gluten, Ryby, Mleko i produkty pochodne"},
    {n: "Tatar wołowy", i: "Siekany, podwędzany dymem z jabłoni. Dodatki: cebula czerwona, ogórek konserwowy, pieczarka marynowana, olej z rukoli, szprotka, żółtko.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Deska polskich serów", i: "Sery: Lazur (pleśniowy, mleko krowie), Bursztyn (długo dojrzewający min. 6 miesięcy), Koryciński (podpuszczkowy z mleka niepasteryzowanego), Bundz (wędzony, mleko krowie i owcze). Dodatki: owoce, orzechy, miód.", a: "Mleko i produkty pochodne, Orzechy"},
    {n: "Borowiki na maśle", i: "Borowiki smażone na maśle, natka pietruszki, czosnek, rozmaryn. Grzanka z półbagietki z parmezanem.", a: "Mleko i produkty pochodne, Orzechy"},
    {n: "Rosół z kury", i: "Gotowany na wiejskiej kurze bez ulepszaczy. Podawany z mięsem z kury, marchewką, natką i domowym makaronem.", a: "Gluten, Jaja, Seler"},
    {n: "Żurek", i: "Wywar z wędzonych kości i wędzonych żeberek. Zakwas, cebula, boczek, kiełbasa, chrzan, majeranek, liść laurowy, ziele angielskie, suszone grzyby, jajka, śmietanka. Podawany w chlebie.", a: "Gluten, Jaja, Mleko i produkty pochodne, Seler"},
    {n: "Zupa borowikowa", i: "Zupa na suszonych grzybach i świeżych borowikach z dodatkiem bulionu i warzyw. Podawana w chlebie (lub w misce na życzenie).", a: "Gluten, Mleko i produkty pochodne, Seler"},
    {n: "Zupa rybna", i: "Przygotowywana na pomidorach pelati, wywarze rybnym z ziołami prowansalskimi, fenkułem i harissą. Podawana ze szafranowym aioli (majonez czosnkowy). Kawałki łososia i sandacza.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Sałatka z wątróbką", i: "Wątróbka smażona w mące, podawana na szpinaku z pomidorkami cherry. Dressing na bazie czerwonego wina, coulis malinowy, krem balsamiczny.", a: "Gluten, Mleko i produkty pochodne"},
    {n: "Sałatka z serem bundz", i: "Mix sałat z oliwkami, papryką, pomidorkami i cebulą czerwoną. Na to wędzony bundz. Dressing miodowo-cytrynowy.", a: "Jaja, Mleko i produkty pochodne, Gorczyca"},
    {n: "Sałata Cezar", i: "Sałata rzymska z grzankami, bekonem, plastrami kurczaka i płatkami parmezanu (Grana Padano). Sos Cezar na bazie majonezu z Anchois, limonki i parmezanu.", a: "Gluten, Jaja, Ryby, Mleko i produkty pochodne"},
    {n: "Pierogi z mięsem", i: "Farsz mięsny wieprzowo-wołowy.", a: "Gluten, Seler, Jaja"},
    {n: "Pierogi ruskie", i: "Farsz na bazie ziemniaków i twarogu tłustego.", a: "Gluten, Jaja, Mleko i przetwory pochodne, Seler"},
    {n: "Pierogi z kapustą", i: "Farsz na bazie pieczarek, kapusty białej i cebuli.", a: "Gluten, Jaja, Seler"},
    {n: "Kotlet schabowy", i: "Kotlet z kością, panierka to mix bułki tartej z panko. Podawany z puree ziemniaczanym z palonym masłem oraz kapustą zasmażaną.", a: "Gluten, Jaja, Gorczyca, Seler, Mleko i produkty pochodne"},
    {n: "Filet z kaczki", i: "Gotowana metodą sous-vide w 54°C (standardowo stopień wysmażenia to idealne medium). Podawana z gratin ziemniaczaną, świeżymi ziołami (rozmaryn, tymianek), sosem jabłkowym własnej produkcji na bazie demi glace. Dodatkowo warzywa.", a: "Brak wpisanych w manualu / Unikać glutenu i nabiału w ciemnych sosach"},
    {n: "Maczanka po krakowsku", i: "Bułka ziemniaczana, karczek wieprzowy długo duszony z sosem kminkowym na bazie demi glace. Dodatki: ogórek kiszony, marmolada z czerwonej cebuli i pieczarki.", a: "Gluten, Jaja, Gorczyca, Seler, Soja, Nasiona sezamu"},
    {n: "Sztuka mięsa", i: "Pręga wołowa (goleń tylna/przednia, liczne przerosty) długo duszona w bulionie wołowym. Sos chrzanowy na bazie białego wina i śmietany, wywar spod pręgi. Puree ziemniaczane, marchewka, dziki brokuł, groszek cukrowy, pomidorki cherry na ciepło.", a: "Mleko i produkty pochodne"},
    {n: "Okoń morski w bulionie", i: "Okoń smażony na maśle, cukinia, marchewka gotowana w bulionie rybnym szafranowym. Dodatki: ziemniaki opiekane, sianko z pora.", a: "Ryby, Mleko (masło)"},
    {n: "Pstrąg", i: "Ryba słodkowodna, przesmażona ze świeżymi ziołami i cytryną. Podawana z małym mixem sałat i opiekanymi ziemniakami.", a: "Jaja, Ryby, Gorczyca"},
    {n: "Makaron penne z kurczakiem", i: "Świeży makaron (nie suszony), kurczak, suszone pomidory i szpinak w sosie śmietanowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Spaghetti carbonara", i: "Świeży makaron, przesmażona pancetta (włoski boczek) zwinięta w rulon, parmezan, żółtko.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Spaghetti pomodoro", i: "Świeży makaron z klasycznym sosem pomidorowym i parmezanem.", a: "Gluten, Jaja, Mleko i produkty pochodne, Seler"},
    {n: "Burger wołowy", i: "Bułka brioszka, mięso wołowe, sałata, ogórek konserwowy, cebula czerwona, ser cheddar, sos barbecue. W zestawie frytki i ketchup.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Kotleciki jagnięce", i: "Przygotowywane zawsze na stopień MEDIUM RARE. Smażone w ząbkach czosnku, w towarzystwie szparagów. Podawane z ziemniakami opiekanymi i pieczonymi.", a: "Brak wyszczególnionych"},
    {n: "Filet z kurczaka kukurydzianego", i: "Filet z kostką przygotowywany sous-vide. Podawany na sałatce z koprem włoskim, rukolą, cebulą czerwoną, pomarańczą. Sos tymiankowy na bazie białego wina i śmietanki.", a: "Gluten, Mleko i produkty pochodne, Seler, Gorczyca"},
    {n: "Polędwica wołowa", i: "Wiadomo - polska. Wyjściowy stopień wysmażenia to MEDIUM. Dodatki dobiera gość osobno.", a: "Brak"},
    {n: "Antrykot wołowy", i: "Antrykot brazylijski. Wyjściowy stopień wysmażenia to MEDIUM. Dodatki dobiera gość.", a: "Brak"},
    {n: "Kanapka klubowa", i: "Ciabatta, sos musztardowo-miodowy z tymiankiem, konfitura z czerwonej cebuli, sałata, pomidor, antrykot z grilla (medium). W zestawie frytki i pomidorki koktajlowe na ciepło.", a: "Gluten, Gorczyca"},
    {n: "Sernik krakowski", i: "Pieczony na kruchym ciastku ze śmietanką i cukrem waniliowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Fondant czekoladowy", i: "Z płynnym wnętrzem, podawany z coulis malinowym i świeżymi owocami.", a: "Gorczyca, Sezam, Mleko i produkty pochodne, Orzechy, Seler, Gluten, Soja, Jaja"},
    {n: "Crème Brûlée", i: "Waniliowy deser z opalanym cukrem trzcinowym.", a: "Mleko i produkty pochodne, Jaja"},
    {n: "Puchar owocowy", i: "Po jednej gałce: sorbet malinowy, sorbet cytrynowy, sorbet mango. Świeże owoce, rurka.", a: "Gluten, Mleko i produkty pochodne, Jaja"},
    {n: "Banana split", i: "Dwie gałki lodów czekoladowych, jedna gałka waniliowych, banan, rurka, bita śmietana.", a: "Gluten, Mleko i produkty pochodne, Jaja"},
    {n: "Puchar Juniora", i: "Jedna gałka lodów 'kaktus', jedna gałka gumy balonowej, M&M'sy, podawane w misiu waflowym.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Śniadanie polskie", i: "Bułka kajzerka, jajecznica z 3 jaj, 2x eko kiełbaski, mix sałat.", a: "Gluten, Jaja, Gorczyca, Mleko i produkty pochodne"},
    {n: "Śniadanie angielskie", i: "Bułka kajzerka, kaszanka, fasolka w sosie pomidorowym, jaja sadzone, pieczarki, pomidor, eko kiełbaski.", a: "Gluten, Jaja, Mleko i produkty pochodne"},
    {n: "Jaja po benedyktyńsku", i: "Bułka, rukola, szynka, szparagi zielone, jaja poche (w koszulce), sos holenderski.", a: "Gluten, Jaja, Mleko i produkty pochodne"}
];

let currentMode = 'flash';
let currentItem = null;
let score = 0;
let streak = 0;
let answered = false;

function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-flash').classList.toggle('active', mode === 'flash');
    document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
    document.getElementById('flashcard-area').style.display = mode === 'flash' ? 'flex' : 'none';
    document.getElementById('quiz-area').style.display = mode === 'quiz' ? 'flex' : 'none';
    nextQuestion();
}

function nextQuestion() {
    answered = false;
    currentItem = menu[Math.floor(Math.random() * menu.length)];
    
    document.getElementById('dish-name').innerText = currentItem.n;
    document.getElementById('dish-ingredients').innerText = currentItem.i;
    document.getElementById('dish-allergens').innerText = "Alergeny: " + currentItem.a;
    document.getElementById('dish-box').style.display = 'none';

    if (currentMode === 'quiz') {
        generateQuizOptions();
    }
}

function flipCard() {
    if (currentMode !== 'flash') return;
    const box = document.getElementById('dish-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function generateQuizOptions() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    
    let options = [currentItem.i];
    while (options.length < 4) {
        let rand = menu[Math.floor(Math.random() * menu.length)].i;
        if (!options.includes(rand)) options.push(rand);
    }
    options.sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        area.appendChild(btn);
    });
}

function checkAnswer(btn, selectedOpt) {
    if (answered) return;
    answered = true;

    if (selectedOpt === currentItem.i) {
        btn.classList.add('correct');
        score++;
        streak++;
    } else {
        btn.classList.add('wrong');
        streak = 0;
        Array.from(document.getElementById('quiz-area').children).forEach(b => {
            if (b.innerText === currentItem.i) b.classList.add('correct');
        });
    }
    document.getElementById('score').innerText = score;
    document.getElementById('streak').innerText = streak;
}

nextQuestion();
</script>
</body>
</html>
